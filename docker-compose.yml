services:
  openldap:
    image: osixia/openldap:1.5.0
    container_name: ldapcc-openldap
    environment:
      LDAP_ORGANISATION: "Gestan"
      LDAP_DOMAIN: "example.org"
      LDAP_BASE_DN: "dc=example,dc=org"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_TLS: "false"
    ports:
      - "389:389"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: ldapcc-phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8081:80"
    depends_on:
      - openldap
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ldapcc-app
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
      - ./scripts:/code/scripts
    depends_on:
      - openldap
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  ldap_data:
  ldap_config:
