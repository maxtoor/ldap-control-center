{% extends "base.html" %}

{% block content %}
<section class="card narrow-card">
  <div class="section-head">
    <h2>Nuova password</h2>
  </div>

  {% if token_valid %}
  <p>Stai reimpostando la password per: <strong>{{ uid }}</strong></p>
  <p>Il link scade dopo {{ ttl_minutes }} minuti.</p>
  <form method="post" action="/password/reset/{{ token }}" class="grid-form" autocomplete="off">
    <label>Nuova password <input type="password" name="password" required data-bwignore="true" /></label>
    <label>Conferma nuova password <input type="password" name="password_confirm" required data-bwignore="true" /></label>
    <button type="submit">Aggiorna password</button>
  </form>
  {% else %}
  <p>Richiedi un nuovo link di reset dalla pagina password.</p>
  <a class="action-link" href="/password/forgot">Vai a recupero password</a>
  {% endif %}
</section>
{% endblock %}
