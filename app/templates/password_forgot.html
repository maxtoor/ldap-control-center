{% extends "base.html" %}

{% block content %}
<section class="card narrow-card">
  <div class="section-head">
    <h2>Reimposta password</h2>
  </div>
  <p>Inserisci nome utente o email istituzionale. Se l'account esiste, inviamo un link di reset alla mail istituzionale.</p>
  <form method="post" action="/password/forgot" class="grid-form" autocomplete="off">
    <label>Nome utente o email <input name="identifier" required data-bwignore="true" /></label>
    <button type="submit">Genera link</button>
  </form>

  {% if generated_link %}
  <div class="alert success">
    Link di reset (modalita test):
    <a href="{{ generated_link }}">{{ generated_link }}</a>
  </div>
  {% endif %}
</section>
{% endblock %}
