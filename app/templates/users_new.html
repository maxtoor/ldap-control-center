{% extends "base.html" %}

{% block content %}
<section class="card narrow-card">
  <div class="section-head">
    <h2>Crea nuovo utente</h2>
    <a class="action-link" href="/users">Vai alla lista</a>
  </div>
  <form method="post" action="/users" class="user-form" autocomplete="off">
    <fieldset class="form-section">
      <legend>1. Informazioni Identificative</legend>
      <div class="grid-form">
        <label>Nome utente <input name="uid" required /></label>
        <label>Nome <input name="given_name" required /></label>
        <label>Cognome <input name="sn" required /></label>
      </div>
    </fieldset>

    <fieldset class="form-section">
      <legend>2. Informazioni Professionali e Affiliazione</legend>
      <div class="grid-form">
        <label>Tipologia rapporto <input name="employee_type" placeholder="es. Ricercatore TD" /></label>
        <label>Qualifica/Mansione <input name="title" /></label>
        <label>Sede di lavoro <input name="office_name" /></label>
      </div>
    </fieldset>

    <fieldset class="form-section">
      <legend>3. Contatti e Reperibilita</legend>
      <div class="grid-form">
        <label>Email istituzionale <input type="email" name="mail" required /></label>
        <label>Email privata <input type="email" name="personal_email" /></label>
        <label>Telefono ufficio <input name="telephone_number" /></label>
        <label>Cellulare <input name="mobile" /></label>
      </div>
    </fieldset>

    <fieldset class="form-section">
      <legend>4. Gestione e Sicurezza</legend>
      <div class="grid-form">
        <label>
          Stato utente
          <select name="user_status">
            <option value="">Seleziona stato</option>
            <option value="Attivo">Attivo</option>
            <option value="Cessato">Cessato</option>
            <option value="Sospeso">Sospeso</option>
          </select>
        </label>
        <label>Data inizio rapporto <input type="date" name="employment_start" /></label>
        <label>Data fine rapporto <input type="date" name="employment_end" /></label>
        <label>
          Password
          <div class="password-input-wrap">
            <input id="new-user-password" type="text" name="password" required />
            <button type="button" id="regen-password-btn" class="password-reload-btn" aria-label="Rigenera password" title="Rigenera password">↻</button>
          </div>
        </label>
        <label class="full-row">Note <input name="notes" /></label>
      </div>
    </fieldset>

    <button type="submit">Crea utente</button>
  </form>
</section>
<script>
  (() => {
    const passwordInput = document.getElementById("new-user-password");
    const regenButton = document.getElementById("regen-password-btn");
    if (!passwordInput || !regenButton) return;

    const upper = "ABCDEFGHJKLMNPQRSTUVWXYZ";
    const lower = "abcdefghijkmnopqrstuvwxyz";
    const digits = "23456789";
    const symbols = "!@#$%&*+-_=?.";
    const all = upper + lower + digits + symbols;

    const pick = (chars) => chars[Math.floor(Math.random() * chars.length)];

    const shuffle = (arr) => {
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    };

    const generateStrongPassword = (length = 16) => {
      const chars = [pick(upper), pick(lower), pick(digits), pick(symbols)];
      for (let i = chars.length; i < length; i += 1) chars.push(pick(all));
      return shuffle(chars).join("");
    };

    const assignPassword = () => {
      passwordInput.value = generateStrongPassword(16);
      passwordInput.setSelectionRange(passwordInput.value.length, passwordInput.value.length);
    };

    if (!passwordInput.value.trim()) assignPassword();
    regenButton.addEventListener("click", assignPassword);
  })();
</script>
{% endblock %}
